version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  mapstyler_style:
    path: ../mapstyler_style

dev_dependencies:
  test: ^1.25.0
  lints: ^4.0.0
