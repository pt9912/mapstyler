name: Publish flutter_mapstyler to pub.dev

on:
  push:
    tags:
      - 'flutter_mapstyler-v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish flutter_mapstyler
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      environment: pub.dev
      working-directory: flutter_mapstyler
