      - uses: actions/checkout@v6
      - run: docker build --target flutter-test .

  flutter-coverage:
    name: Flutter – Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - run: docker build --target flutter-coverage-check --no-cache-filter flutter-coverage --progress=plain .
