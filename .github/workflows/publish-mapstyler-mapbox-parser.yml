name: Publish mapstyler_mapbox_parser to pub.dev

on:
  push:
    tags:
      - 'mapstyler_mapbox_parser-v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish mapstyler_mapbox_parser
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      environment: pub.dev
      working-directory: mapstyler_mapbox_parser
