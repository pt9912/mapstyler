name: Publish qml4dart to pub.dev

on:
  push:
    tags:
      - 'qml4dart-v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish qml4dart
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      environment: pub.dev
      working-directory: qml4dart
