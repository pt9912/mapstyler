name: mapstyler_mapbox_adapter
description: Mapbox GL Style adapter for the mapstyler ecosystem. Converts Mapbox styles to and from mapstyler_style types.
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  mapbox4dart:
    path: ../mapbox4dart
  mapstyler_style:
    path: ../mapstyler_style

dev_dependencies:
  test: ^1.25.0
  lints: ^6.1.0
