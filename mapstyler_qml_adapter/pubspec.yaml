name: mapstyler_qml_adapter
description: Converts between QGIS QML layer styles and the mapstyler_style type system via qml4dart. Supports reading and writing of QML symbology including fill, line, and marker symbolizers.
version: 0.2.1
repository: https://github.com/pt9912/mapstyler
resolution: workspace

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  qml4dart: ^0.1.1
  mapstyler_style: ^0.1.1

dev_dependencies:
  test: ^1.25.0
  lints: ^6.1.0
